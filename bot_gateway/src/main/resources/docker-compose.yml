services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: memo_echo_napcat
    environment:
      # ⚠️ 注意：这里填你的 SpringBoot 网关接收地址
      - WEBHOOK_URL=http://host.docker.internal:8090/api/bot/webhook
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/qq:/app/.config/QQ
    ports:
      - "6099:6099"
      - "3011:3011"
    restart: always
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos-standalone
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=256m
    ports:
      - "8848:8848"
      - "9848:9848"
    restart: always
