<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoEcho Landing - React + Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif']
            }
          }
        }
      };
    </script>
  </head>
  <body class="bg-[#0A0A0A] font-sans text-white antialiased">
    <div id="root"></div>

    <script type="text/babel">
      const { Fragment } = React;

      const menuItems = ['Inbox', 'My issues', 'Reviews', 'Groups', 'Risk logs'];

      const issues = [
        ['Schedule request from software group', 'Waiting for admin review', 'Review', 'bg-violet-400'],
        ['Bot status synchronized', '3 active services online', 'Done', 'bg-emerald-400'],
        ['Group memory indexed', '15 messages embedded today', 'Live', 'bg-sky-400']
      ];

      function Logo() {
        return (
          <div className="flex items-center gap-3">
            <div className="h-7 w-7 rounded-lg border border-white/20 bg-white shadow-[0_0_34px_rgba(255,255,255,0.08)]" />
            <span className="text-sm font-semibold tracking-tight text-white">MemoEcho</span>
          </div>
        );
      }

      function AppMockup() {
        return (
          <div className="mx-auto mt-10 grid min-h-[540px] w-full max-w-6xl grid-cols-[220px_minmax(0,1fr)] overflow-hidden rounded-[18px] border border-white/10 bg-[#111111] shadow-[0_40px_140px_rgba(0,0,0,0.65),0_0_80px_rgba(124,92,255,0.08)] max-lg:grid-cols-1">
            <aside className="border-r border-white/10 bg-[#0D0D0F] p-5 max-lg:hidden">
              <div className="mb-8 flex gap-2">
                <span className="h-2.5 w-2.5 rounded-full bg-white/20" />
                <span className="h-2.5 w-2.5 rounded-full bg-white/20" />
                <span className="h-2.5 w-2.5 rounded-full bg-white/20" />
              </div>
              <nav className="grid gap-2">
                {menuItems.map((item, index) => (
                  <button
                    key={item}
                    className={`min-h-9 rounded-lg px-3 text-left text-sm ${
                      index === 0 ? 'bg-white/10 text-white' : 'text-neutral-500 hover:bg-white/[0.06] hover:text-white'
                    }`}
                  >
                    {item}
                  </button>
                ))}
              </nav>
            </aside>

            <section className="min-w-0">
              <div className="flex min-h-16 items-center justify-between gap-5 border-b border-white/10 px-6 text-sm text-neutral-400 max-md:flex-col max-md:items-start max-md:py-5">
                <span>MemoEcho / workspace / schedule-memory</span>
                <div className="flex flex-wrap justify-end gap-2">
                  <span className="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/[0.04] px-3 py-1.5 text-neutral-200">
                    <i className="h-1.5 w-1.5 rounded-full bg-yellow-400" />
                    In Progress
                  </span>
                  <span className="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/[0.04] px-3 py-1.5 text-neutral-200">
                    <i className="h-2 w-3 rounded-sm bg-[linear-gradient(90deg,#f87171_25%,#fb923c_25%_58%,#facc15_58%)]" />
                    High Priority
                  </span>
                </div>
              </div>

              <div className="p-8 max-md:p-5">
                <span className="text-xs font-semibold uppercase tracking-[0.14em] text-violet-400">AI extracted memory</span>
                <h2 className="mt-4 max-w-2xl text-[clamp(1.7rem,3.1vw,3.2rem)] font-semibold leading-tight tracking-[-0.03em] max-md:text-3xl">
                  Volunteer service at Rainbow Corridor
                </h2>
                <p className="mt-5 max-w-2xl leading-8 text-neutral-400">
                  Extracted from a group announcement with time, location, participants, and task context ready for retrieval.
                </p>

                <div className="mt-8 grid grid-cols-3 gap-3 max-md:grid-cols-1">
                  {[
                    ['Time', 'Apr 11, 10:00'],
                    ['Location', 'Dining Hall 8'],
                    ['Risk score', 'Normal']
                  ].map(([label, value]) => (
                    <article key={label} className="rounded-xl border border-white/10 bg-white/[0.035] p-4">
                      <span className="text-sm text-neutral-500">{label}</span>
                      <strong className="mt-2 block text-white">{value}</strong>
                    </article>
                  ))}
                </div>

                <div className="mt-5 grid gap-3">
                  {issues.map(([title, meta, state, tone]) => (
                    <div key={title} className="grid grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-3 rounded-xl border border-white/10 bg-white/[0.035] p-4 max-sm:grid-cols-[auto_minmax(0,1fr)]">
                      <span className={`h-2.5 w-2.5 rounded-full ${tone}`} />
                      <div>
                        <strong className="block text-white">{title}</strong>
                        <small className="text-neutral-500">{meta}</small>
                      </div>
                      <b className="text-xs font-semibold text-neutral-300 max-sm:col-start-2">{state}</b>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          </div>
        );
      }

      function LandingPage() {
        return (
          <Fragment>
            <header className="sticky top-0 z-10 mx-auto grid w-[min(1180px,calc(100%-40px))] grid-cols-[1fr_auto_1fr] items-center border-b border-white/10 bg-[#0A0A0A]/80 py-5 backdrop-blur-xl max-md:grid-cols-1 max-md:gap-4">
              <Logo />
              <nav className="flex items-center gap-8 text-sm text-neutral-500">
                {['Product', 'Features', 'Docs'].map((item) => (
                  <a key={item} href={`#${item.toLowerCase()}`} className="hover:text-white">
                    {item}
                  </a>
                ))}
              </nav>
              <a href="/auth" className="justify-self-end rounded-full border border-white bg-white px-4 py-2 text-sm font-semibold text-black hover:shadow-[0_0_34px_rgba(255,255,255,0.18)] max-md:justify-self-start">
                Open app
              </a>
            </header>

            <main>
              <section className="mx-auto w-[min(1180px,calc(100%-40px))] py-28 text-center max-md:py-20">
                <div className="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/[0.035] px-3 py-1.5 text-sm text-neutral-300 shadow-[0_0_32px_rgba(124,92,255,0.10)]">
                  <span className="h-1.5 w-1.5 rounded-full bg-violet-500 shadow-[0_0_16px_rgba(139,92,246,0.9)]" />
                  MemoEcho v1.0 is live -&gt;
                </div>
                <h1 className="mx-auto mt-7 max-w-5xl text-[clamp(4rem,10vw,8.8rem)] font-bold leading-tight tracking-[-0.045em] text-zinc-100">
                  The intelligent memory system for modern minds
                </h1>
                <p className="mx-auto mt-10 max-w-2xl text-[clamp(1.08rem,1.7vw,1.35rem)] leading-8 text-neutral-400">
                  Purpose-built for capturing thoughts and building knowledge graphs. Designed for the AI era.
                </p>
              </section>

              <section className="mx-auto w-[min(1180px,calc(100%-40px))] pb-24">
                <AppMockup />
              </section>
            </main>
          </Fragment>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<LandingPage />);
    </script>
  </body>
</html>
