<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoEcho 群与机器人 - React + Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif']
            }
          }
        }
      };
    </script>
  </head>
  <body class="bg-[#0A0A0A] font-sans text-white antialiased">
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      const navItems = ['日程申请', '群与机器人', '风险监控', '发送消息'];
      const groups = [
        { name: 'Memo Echo项目小组', id: '987654321', members: 38, badge: 12 },
        { name: '软件工程课程群', id: '739204181', members: 126, badge: 7 },
        { name: '志愿活动通知群', id: '582019334', members: 64, badge: 3 },
        { name: '社团招新讨论组', id: '672190045', members: 89, badge: 5 }
      ];
      const friends = [
        { name: 'Mnemosyne', id: '2755922851', remark: '主控机器人' },
        { name: 'MemoEcho Bot', id: '3116070057', remark: '备用机器人' },
        { name: '日程助手', id: '3410007440', remark: '提醒通道' }
      ];

      function Sidebar() {
        return (
          <aside className="flex min-h-screen w-64 shrink-0 flex-col border-r border-white/10 bg-[#111111]/95 p-4 shadow-[0_0_60px_rgba(255,255,255,0.02)] backdrop-blur-xl">
            <div className="flex items-center gap-3 border-b border-white/10 px-2 pb-5">
              <div className="h-8 w-8 rounded-lg border border-white/15 bg-white shadow-[0_0_28px_rgba(255,255,255,0.08)]" />
              <div>
                <strong className="block text-sm font-bold text-white">MemoEcho</strong>
                <span className="text-xs text-neutral-500">后台管理系统</span>
              </div>
            </div>

            <nav className="mt-5 grid gap-1 rounded-2xl border border-white/10 bg-white/[0.025] p-2 backdrop-blur-xl">
              {navItems.map((item) => (
                <button
                  key={item}
                  className={`min-h-10 rounded-xl px-3 text-left text-sm transition ${
                    item === '群与机器人'
                      ? 'bg-white/10 text-white shadow-[inset_3px_0_0_#8b5cf6]'
                      : 'text-neutral-500 hover:bg-white/[0.06] hover:text-white'
                  }`}
                >
                  {item}
                </button>
              ))}
            </nav>

            <button className="mt-auto rounded-full border border-white bg-white px-4 py-2 text-sm font-bold text-black hover:shadow-[0_0_34px_rgba(255,255,255,0.18)]">
              Open app
            </button>
          </aside>
        );
      }

      function PageHeader({ onToast }) {
        const buttons = ['+ 刷新群聊列表', '+ 刷新好友列表', '+ 刷新机器人状态'];
        return (
          <header className="flex items-start justify-between gap-6 border-b border-white/10 pb-7 max-xl:flex-col">
            <div>
              <h1 className="text-5xl font-black tracking-[-0.04em] text-white">群聊与机器人</h1>
              <p className="mt-3 text-neutral-400">全局管理机器人状态，群组和好友。</p>
            </div>
            <div className="flex flex-wrap gap-3">
              {buttons.map((label, index) => (
                <button
                  key={label}
                  onClick={onToast}
                  className={`rounded-full border px-4 py-2 text-sm font-bold transition ${
                    index === 0
                      ? 'border-violet-400/40 bg-violet-500/20 text-white shadow-[0_0_34px_rgba(139,92,246,0.18)] hover:bg-violet-500/30'
                      : 'border-white/10 bg-white/[0.06] text-neutral-200 hover:border-white/20 hover:bg-white/[0.09] hover:shadow-[0_0_28px_rgba(255,255,255,0.06)]'
                  }`}
                >
                  {label}
                </button>
              ))}
            </div>
          </header>
        );
      }

      function RobotStatusCard() {
        return (
          <section className="mt-7 rounded-2xl border border-white/10 bg-[#111111] p-5 shadow-[0_0_60px_rgba(255,255,255,0.02)]">
            <div className="flex items-center justify-between gap-5">
              <div className="flex items-center gap-4">
                <div className="grid h-12 w-12 place-items-center rounded-xl border border-violet-400/30 bg-violet-500/15 text-sm font-black text-violet-100 shadow-[0_0_32px_rgba(139,92,246,0.12)]">
                  ME
                </div>
                <div>
                  <strong className="block text-lg font-bold text-white">3808841419</strong>
                  <span className="text-sm text-neutral-500">status: 3808841419</span>
                </div>
              </div>
              <span className="inline-flex items-center gap-2 rounded-full border border-emerald-400/20 bg-emerald-400/10 px-3 py-1.5 text-sm font-bold text-white">
                <i className="h-2 w-2 animate-pulse rounded-full bg-emerald-400 shadow-[0_0_16px_rgba(52,211,153,0.85)]" />
                在线
              </span>
            </div>
          </section>
        );
      }

      function TrashIcon() {
        return (
          <svg viewBox="0 0 24 24" className="h-4 w-4" fill="none" stroke="currentColor" strokeWidth="1.8">
            <path d="M4 7h16" />
            <path d="M10 11v6" />
            <path d="M14 11v6" />
            <path d="M6 7l1 14h10l1-14" />
            <path d="M9 7V4h6v3" />
          </svg>
        );
      }

      function ListItem({ item, type, onDelete }) {
        return (
          <article className="group flex min-h-[68px] items-center justify-between gap-4 rounded-xl border border-white/10 bg-white/[0.025] px-4 py-3 transition hover:border-white/20 hover:bg-white/[0.045]">
            <div className="min-w-0">
              <div className="flex items-center gap-2">
                <strong className="truncate text-sm font-bold text-white">{item.name}</strong>
                {type === 'group' && (
                  <span className="rounded-full border border-violet-400/20 bg-violet-500/10 px-2 py-0.5 text-xs font-bold text-violet-200">
                    {item.badge}
                  </span>
                )}
              </div>
              <p className="mt-1 truncate text-xs text-neutral-500">
                {type === 'group' ? `ID ${item.id} · 成员数 ${item.members}` : `ID ${item.id} · 备注 ${item.remark}`}
              </p>
            </div>
            <button
              onClick={() => onDelete(item)}
              className="grid h-8 w-8 place-items-center rounded-lg border border-red-400/20 bg-red-500/10 text-red-200 opacity-0 transition hover:bg-red-500/20 group-hover:opacity-100"
              aria-label={`删除${item.name}`}
            >
              <TrashIcon />
            </button>
          </article>
        );
      }

      function SplitLists({ onDelete }) {
        return (
          <section className="mt-7 grid grid-cols-2 gap-5 rounded-2xl border border-white/10 bg-[#111111] p-5 shadow-[0_0_60px_rgba(255,255,255,0.02)] max-lg:grid-cols-1">
            <div>
              <div className="mb-4 flex items-center justify-between">
                <h2 className="text-lg font-bold text-white">群聊列表</h2>
                <span className="rounded-full bg-white/[0.06] px-2.5 py-1 text-xs text-neutral-300">{groups.length}</span>
              </div>
              <div className="grid gap-2">
                {groups.map((group) => (
                  <ListItem key={group.id} item={group} type="group" onDelete={onDelete} />
                ))}
              </div>
            </div>

            <div>
              <div className="mb-4 flex items-center justify-between">
                <h2 className="text-lg font-bold text-white">好友列表</h2>
                <span className="rounded-full bg-white/[0.06] px-2.5 py-1 text-xs text-neutral-300">{friends.length}</span>
              </div>
              <div className="grid gap-2">
                {friends.map((friend) => (
                  <ListItem key={friend.id} item={friend} type="friend" onDelete={onDelete} />
                ))}
              </div>
            </div>
          </section>
        );
      }

      function ConfirmDialog({ target, onCancel, onConfirm }) {
        if (!target) return null;
        return (
          <div className="fixed inset-0 z-40 grid place-items-center bg-black/70 p-5 backdrop-blur-sm">
            <div className="w-full max-w-md rounded-2xl border border-white/10 bg-[#111111] p-6 shadow-[0_0_80px_rgba(0,0,0,0.8)]">
              <h3 className="text-xl font-black text-white">确认删除？</h3>
              <p className="mt-3 text-sm leading-6 text-neutral-400">
                即将处理 <span className="text-white">{target.name}</span>。该操作会从当前列表中移除目标，请确认后继续。
              </p>
              <div className="mt-6 flex justify-end gap-3">
                <button onClick={onCancel} className="rounded-full border border-white/10 bg-white/[0.06] px-4 py-2 text-sm font-bold text-neutral-200">
                  取消
                </button>
                <button onClick={onConfirm} className="rounded-full border border-red-400/30 bg-red-500/20 px-4 py-2 text-sm font-bold text-red-100 shadow-[0_0_28px_rgba(248,113,113,0.12)]">
                  确认删除
                </button>
              </div>
            </div>
          </div>
        );
      }

      function Toast({ show }) {
        if (!show) return null;
        return (
          <div className="fixed right-6 top-6 z-50 rounded-2xl border border-emerald-400/20 bg-[#111111]/95 px-4 py-3 text-sm font-semibold text-emerald-50 shadow-[0_0_44px_rgba(52,211,153,0.16)] backdrop-blur-xl">
            已为您成功刷新群日程申请。
          </div>
        );
      }

      function GroupRobotPage() {
        const [toast, setToast] = useState(true);
        const [target, setTarget] = useState(null);

        const showToast = () => {
          setToast(true);
          window.clearTimeout(window.__memoechoToast);
          window.__memoechoToast = window.setTimeout(() => setToast(false), 3000);
        };

        return (
          <main className="flex min-h-screen bg-[#0A0A0A] text-white">
            <Sidebar />
            <section className="min-w-0 flex-1 px-8 py-7">
              <PageHeader onToast={showToast} />
              <RobotStatusCard />
              <SplitLists onDelete={setTarget} />
            </section>
            <ConfirmDialog target={target} onCancel={() => setTarget(null)} onConfirm={() => setTarget(null)} />
            <Toast show={toast} />
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<GroupRobotPage />);
    </script>
  </body>
</html>
