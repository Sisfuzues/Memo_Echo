<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园舆情百分制风控大屏</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/echarts/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; background-color: #f5f7fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        #app { padding: 25px; max-width: 1400px; margin: 0 auto; }
        .dashboard-header { margin-bottom: 25px; color: #1f2f3d; display: flex; align-items: center; }
        .stat-card { border-radius: 12px; border: none; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card .title { font-size: 13px; color: #8492a6; margin-bottom: 8px; font-weight: bold; }
        .stat-card .value { font-size: 32px; font-weight: 800; }
        .color-safe { color: #67C23A; }
        .color-low { color: #409EFF; }
        .color-mid { color: #E6A23C; }
        .color-high { color: #F56C6C; }
        .panel-container { margin-top: 24px; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .chart-box { height: 400px; width: 100%; }
        .filter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
<div id="app">
    <div class="dashboard-header">
        <el-icon :size="30" style="margin-right: 10px; color: #409EFF;"><Monitor /></el-icon>
        <h2 style="margin: 0;">校园舆情百分制风控引擎 (ACDAT 实战分析)</h2>
    </div>

    <el-row :gutter="20">
        <el-col :span="4">
            <el-card shadow="never" class="stat-card">
                <div class="title">总解析记录</div>
                <div class="value">{{ tableData.length }}</div>
            </el-card>
        </el-col>
        <el-col :span="5">
            <el-card shadow="never" class="stat-card">
                <div class="title">✅ 绝对安全 (0分)</div>
                <div class="value color-safe">{{ stats.safe }}</div>
            </el-card>
        </el-col>
        <el-col :span="5">
            <el-card shadow="never" class="stat-card">
                <div class="title">🔵 低危预警 (1-30)</div>
                <div class="value color-low">{{ stats.low }}</div>
            </el-card>
        </el-col>
        <el-col :span="5">
            <el-card shadow="never" class="stat-card">
                <div class="title">🟡 中危审查 (31-70)</div>
                <div class="value color-mid">{{ stats.mid }}</div>
            </el-card>
        </el-col>
        <el-col :span="5">
            <el-card shadow="never" class="stat-card">
                <div class="title">🔴 高危斩杀 (71-100+)</div>
                <div class="value color-high">{{ stats.high }}</div>
            </el-card>
        </el-col>
    </el-row>

    <div class="panel-container">
        <div style="font-weight: bold; font-size: 15px; margin-bottom: 12px; color: #606266;">📫 实时文本投递 (支持批量粘贴)</div>
        <el-input
                v-model="inputText"
                :rows="5"
                type="textarea"
                placeholder="在此粘贴学校通知或历史系文献摘要... 每行将被视为独立样本进行算分。"
        ></el-input>
        <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 12px; color: #909399;">后端接口：http://127.0.0.1:8180/test/sensitive_filter</span>
            <el-button type="primary" size="large" @click="handleAnalyze" :loading="loading" style="padding: 0 40px;">
                立即分析分值走向
            </el-button>
        </div>
    </div>

    <div class="panel-container">
        <div id="trendChart" class="chart-box"></div>
    </div>

    <div class="panel-container">
        <div class="filter-header">
            <span style="font-weight: bold; color: #606266;">📋 风险明细列表</span>
            <el-radio-group v-model="filterTag" size="small">
                <el-radio-button label="全部"></el-radio-button>
                <el-radio-button label="安全"></el-radio-button>
                <el-radio-button label="风险"></el-radio-button>
            </el-radio-group>
        </div>
        <el-table :data="displayData" style="width: 100%" height="450" border stripe>
            <el-table-column prop="id" label="ID" width="80"></el-table-column>
            <el-table-column prop="text" label="消息原文内容" show-overflow-tooltip></el-table-column>
            <el-table-column prop="score" label="百分制得分" width="120" sortable>
                <template #default="scope">
                    <b :class="getScoreClass(scope.row.score)">{{ scope.row.score }}</b>
                </template>
            </el-table-column>
            <el-table-column label="定级" width="120">
                <template #default="scope">
                    <el-tag :type="getTagType(scope.row.score)" effect="dark" size="small">
                        {{ getLevelLabel(scope.row.score) }}
                    </el-tag>
                </template>
            </el-table-column>
        </el-table>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted, nextTick } = Vue;
    const { ElMessage } = ElementPlus;

    const app = createApp({
        setup() {
            const inputText = ref('');
            const tableData = ref([]);
            const loading = ref(false);
            const filterTag = ref('全部');
            let chartInstance = null;
            let idCounter = 10001;

            // 统计数据
            const stats = computed(() => {
                return {
                    safe: tableData.value.filter(d => d.score === 0).length,
                    low: tableData.value.filter(d => d.score > 0 && d.score <= 30).length,
                    mid: tableData.value.filter(d => d.score > 30 && d.score <= 70).length,
                    high: tableData.value.filter(d => d.score > 70).length
                }
            });

            const displayData = computed(() => {
                if (filterTag.value === '安全') return tableData.value.filter(d => d.score === 0);
                if (filterTag.value === '风险') return tableData.value.filter(d => d.score > 0);
                return tableData.value;
            });

            // 调用 Java 后端
            const handleAnalyze = async () => {
                const lines = inputText.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                if (lines.length === 0) return ElMessage.warning('请输入有效文本');

                loading.value = true;
                try {
                    const res = await fetch('http://127.0.0.1:8180/test/sensitive_filter', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(lines)
                    });
                    const scores = await res.json();

                    const processed = lines.map((t, i) => ({
                        id: idCounter++,
                        text: t,
                        score: scores[i]
                    }));

                    tableData.value.unshift(...processed);
                    inputText.value = '';
                    updateChart();
                    ElMessage.success(`分析完成，新增 ${lines.length} 条记录`);
                } catch (e) {
                    ElMessage.error('无法连接后端，请检查 8180 端口及 @CrossOrigin 注解');
                } finally {
                    loading.value = false;
                }
            };

            // 更新 0-100 分分布折线图
            const updateChart = () => {
                if (!chartInstance) chartInstance = echarts.init(document.getElementById('trendChart'));

                // 构造 0-100 的计数桶
                const bins = new Array(101).fill(0);
                tableData.value.forEach(d => {
                    const s = Math.min(d.score, 100);
                    bins[s]++;
                });

                const option = {
                    tooltip: { trigger: 'axis', formatter: '<b>{b}分</b><br/>消息数：{c}条' },
                    title: { text: '风险得分走向分布曲线 (0-100)', left: 'center', textStyle: { color: '#606266' } },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: {
                        type: 'category',
                        data: Array.from({length: 101}, (_, i) => i),
                        axisLabel: { interval: 9 }, // 每隔10分显示一个刻度
                        boundaryGap: false
                    },
                    yAxis: { type: 'value', minInterval: 1 },
                    series: [{
                        name: '频次',
                        type: 'line',
                        smooth: true,
                        showSymbol: false,
                        data: bins,
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(64, 158, 255, 0.5)' },
                                { offset: 1, color: 'rgba(64, 158, 255, 0)' }
                            ])
                        },
                        lineStyle: { width: 3, color: '#409EFF' }
                    }]
                };
                chartInstance.setOption(option);
            };

            // 辅助函数
            const getScoreClass = (s) => {
                if (s === 0) return 'color-safe';
                if (s <= 30) return 'color-low';
                if (s <= 70) return 'color-mid';
                return 'color-high';
            };
            const getTagType = (s) => {
                if (s === 0) return 'success';
                if (s <= 30) return 'info';
                if (s <= 70) return 'warning';
                return 'danger';
            };
            const getLevelLabel = (s) => {
                if (s === 0) return '安全';
                if (s <= 30) return '低危';
                if (s <= 70) return '中危';
                return '高危';
            };

            onMounted(() => {
                updateChart();
                window.addEventListener('resize', () => chartInstance && chartInstance.resize());
            });

            return {
                inputText, tableData, loading, stats, displayData, filterTag,
                handleAnalyze, getScoreClass, getTagType, getLevelLabel
            };
        }
    });
    app.use(ElementPlus);
    app.mount('#app');
</script>
</body>
</html>
